apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-basic
  labels:
    app: hello-basic
    example: "01-basic"
spec:
  revisionHistoryLimit: 2
  replicas: 1
  # Recreate = kill old pod BEFORE starting new one.
  # Required when using ReadWriteOnce PVCs — otherwise the rolling update
  # stalls because the new pod can't attach the disk while the old pod holds it.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hello-basic
  template:
    metadata:
      labels:
        app: hello-basic
    spec:
      containers:
        - name: node
          image: europe-central2-docker.pkg.dev/argocd-study-1775564129/playground/hello-basic:797b6d6
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: hello-basic-config
          env:
            - name: REDIS_HOST
              value: "localhost"
            - name: REDIS_PORT
              value: "6379"
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: hello-basic-secret
                  key: API_KEY
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi

        - name: redis
          image: redis:7-alpine
          # --appendonly yes = AOF persistence (Redis writes every command
          # to a log file). Combined with the volume mount below, counter
          # survives pod restarts.
          args:
            - redis-server
            - --appendonly
            - "yes"
            - --dir
            - /data
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi

      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: hello-basic-redis-data
