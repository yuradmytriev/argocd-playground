apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-basic
  labels:
    app: hello-basic
    example: "01-basic"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hello-basic
  template:
    metadata:
      labels:
        app: hello-basic
    spec:
      containers:
        - name: node
          image: europe-central2-docker.pkg.dev/argocd-study-1775564129/playground/hello-basic:797b6d6
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: hello-basic-config
          env:
            - name: REDIS_HOST
              value: "localhost"
            - name: REDIS_PORT
              value: "6379"
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: hello-basic-secret
                  key: API_KEY
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi

        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
