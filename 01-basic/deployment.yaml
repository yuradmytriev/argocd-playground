apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-basic
  labels:
    app: hello-basic
    example: "01-basic"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-basic
  template:
    metadata:
      labels:
        app: hello-basic
    spec:
      containers:
        - name: node
          image: node:20-alpine
          command: ["node", "/app/server.js"]
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: code
              mountPath: /app
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: code
          configMap:
            name: hello-basic-code
