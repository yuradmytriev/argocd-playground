apiVersion: v1
kind: Secret
metadata:
  name: hello-basic-secret
  labels:
    app: hello-basic
    example: "01-basic"
type: Opaque
# stringData = human-readable (Kubernetes base64-encodes it for you).
# NOTE: checking Secrets into git in plaintext is a playground-only pattern.
# For real projects use Sealed Secrets, SOPS, External Secrets Operator,
# or GCP Secret Manager via CSI driver.
stringData:
  API_KEY: "super-secret-playground-key-123"
