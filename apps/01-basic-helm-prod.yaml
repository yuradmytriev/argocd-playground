apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 01-basic-helm-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/yuradmytriev/argocd-playground.git
    targetRevision: HEAD
    path: 01-basic-helm
    helm:
      # values.yaml (base) + values-prod.yaml (prod overrides).
      # Later files win on key conflicts.
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: playground-helm-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
