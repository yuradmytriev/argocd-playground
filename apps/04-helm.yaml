apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 04-helm
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/yuradmytriev/argocd-playground.git
    targetRevision: HEAD
    path: 04-helm
    helm:
      # Override values from values.yaml inline — this is a common pattern
      values: |
        replicaCount: 2
  destination:
    server: https://kubernetes.default.svc
    namespace: playground
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
