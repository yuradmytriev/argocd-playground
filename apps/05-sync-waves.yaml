apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 05-sync-waves
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/yuradmytriev/argocd-playground.git
    targetRevision: HEAD
    path: 05-sync-waves
  destination:
    server: https://kubernetes.default.svc
    namespace: playground
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
