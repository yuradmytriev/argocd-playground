apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  # -------- Email service (Gmail SMTP) --------
  # Credentials live in the argocd-notifications-secret Secret.
  # For Gmail you MUST use an App Password (Google Account →
  # Security → 2-Step Verification → App passwords), not your
  # normal account password.
  service.email.gmail: |
    host: smtp.gmail.com
    port: 465
    from: $email-username
    username: $email-username
    password: $email-password

  # -------- Templates --------
  template.app-deployed: |
    email:
      subject: "[Argo CD] Deployed: {{.app.metadata.name}}"
    message: |
      Application {{.app.metadata.name}} is now healthy and synced.

      Revision: {{.app.status.sync.revision}}
      Project:  {{.app.spec.project}}
      Cluster:  {{.app.spec.destination.server}}
      Namespace: {{.app.spec.destination.namespace}}

  template.app-sync-failed: |
    email:
      subject: "[Argo CD] Sync FAILED: {{.app.metadata.name}}"
    message: |
      Application {{.app.metadata.name}} failed to sync.

      Phase:   {{.app.status.operationState.phase}}
      Message: {{.app.status.operationState.message}}
      Revision: {{.app.status.sync.revision}}

  template.app-health-degraded: |
    email:
      subject: "[Argo CD] Health DEGRADED: {{.app.metadata.name}}"
    message: |
      Application {{.app.metadata.name}} health has degraded.

      Status:  {{.app.status.health.status}}
      Message: {{.app.status.health.message}}

  template.app-sync-status-unknown: |
    email:
      subject: "[Argo CD] Sync status UNKNOWN: {{.app.metadata.name}}"
    message: |
      Application {{.app.metadata.name}} sync status is Unknown.
      Check the Argo CD UI for details.

  # -------- Triggers --------
  trigger.on-deployed: |
    - description: Application is synced and healthy
      when: app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
      oncePer: app.status.sync.revision
      send: [app-deployed]

  trigger.on-sync-failed: |
    - description: Application sync failed
      when: app.status.operationState.phase in ['Error', 'Failed']
      send: [app-sync-failed]

  trigger.on-health-degraded: |
    - description: Application health degraded
      when: app.status.health.status == 'Degraded'
      send: [app-health-degraded]

  trigger.on-sync-status-unknown: |
    - description: Application sync status is unknown
      when: app.status.sync.status == 'Unknown'
      send: [app-sync-status-unknown]

  # -------- Default subscriptions --------
  # Every Application in the cluster will send these triggers to
  # yuramijs@gmail.com unless the Application overrides with its own
  # notifications.argoproj.io/subscribe.* annotation.
  subscriptions: |
    - recipients:
        - email:yuraminodejs@gmail.com
      triggers:
        - on-deployed
        - on-sync-failed
        - on-health-degraded
        - on-sync-status-unknown
